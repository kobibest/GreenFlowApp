[functions.sms-filters]
enabled = true
verify_jwt = false
entrypoint = "./functions/sms-filters/index.ts"

[functions.verify-purchase]
enabled = true
verify_jwt = true
import_map = "./functions/verify-purchase/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/verify-purchase/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/verify-purchase/*.html" ]

